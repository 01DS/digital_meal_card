<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Meal Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #FFD6C0, #F8C8DC);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        width: 340px;
        background: #ffffff;
        border-radius: 25px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .profile {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        margin-bottom: 10px;
    }

    h2 {
        margin: 5px 0;
        color: #444;
    }

    .id {
        font-size: 14px;
        color: #777;
        margin-bottom: 15px;
    }

    .info {
        background: #FFF6FA;
        padding: 15px;
        border-radius: 15px;
        font-size: 14px;
        color: #444;
        text-align: left;
        margin-bottom: 20px;
    }

    .info div {
        margin-bottom: 6px;
    }

    .status {
        background: #C8F7DC;
        padding: 8px;
        border-radius: 12px;
        text-align: center;
        font-weight: 600;
        color: #2D6B2D;
        margin-top: 8px;
    }

    .qr-box {
        background: #ffffff;
        padding: 15px;
        border-radius: 18px;
        display: inline-block;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
</style>
</head>

<body>

<div class="card">

    <img src="https://via.placeholder.com/90" class="profile">

    <h2>Selam Kebede</h2>
    <div class="id">UGR/1234/12</div>

    <div class="info">
        <div><strong>Department:</strong> Computer Science</div>
        <div><strong>Year:</strong> 3rd Year</div>
        <div class="status">Café User</div>
    </div>

    <div class="qr-box">
        <canvas id="qrCanvas"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
    const studentID = "UGR/1234/12";

    QRCode.toCanvas(
        document.getElementById("qrCanvas"),
        studentID,
        {
            width: 150,
            color: {
                dark: "#5e548e",
                light: "#ffffff"
            }
        }
    );
</script>

</body>
</html>
