<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meal Reports</title>

  <style>
    :root {
      --peach: #FFE5D9;
      --soft-pink: #FFCAD4;
      --rose: #F4ACB7;
      --text-dark: #4A4A4A;
      --white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--peach);
      color: var(--text-dark);
    }

    /* ===== Layout ===== */
    .container {
      display: flex;
      min-height: 100vh;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 230px;
      background: var(--soft-pink);
      padding: 25px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      color: #6B3E46;
    }

    .sidebar a {
      display: block;
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-dark);
      transition: 0.2s;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: var(--rose);
      color: white;
    }

    /* ===== Main Content ===== */
    .main {
      flex: 1;
      padding: 40px;
    }

    .main h1 {
      margin-bottom: 25px;
      color: #6B3E46;
    }

    /* ===== Filters ===== */
    .filters {
      background: var(--white);
      padding: 20px;
      border-radius: 16px;
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 30px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    .filters input,
    .filters select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    .filters button {
      background: var(--rose);
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .filters button:hover {
      opacity: 0.85;
    }

    /* ===== Table ===== */
    .table-box {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 12px;
      background: var(--soft-pink);
      color: #6B3E46;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      display: inline-block;
    }

    .served {
      background: #D8F3DC;
      color: #2D6A4F;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="studentlist.html">Students</a>
    <a href="reports.html" class="active">Reports</a>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <h1>Meal Reports</h1>

    <!-- Filters -->
    <div class="filters">
      <input type="date">
      <select>
        <option>All Sessions</option>
        <option>Breakfast</option>
        <option>Lunch</option>
        <option>Dinner</option>
      </select>
      <button>Generate</button>
    </div>

    <!-- Table -->
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Session</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>STU001</td>
            <td>Ali Ahmed</td>
            <td>Breakfast</td>
            <td>2025-01-12</td>
            <td>01:45</td>
            <td><span class="status served">Served</span></td>
          </tr>
          <tr>
            <td>STU002</td>
            <td>Sara Mohamed</td>
            <td>Lunch</td>
            <td>2025-01-12</td>
            <td>06:30</td>
            <td><span class="status served">Served</span></td>
          </tr>
        </tbody>
      </table>
    </div>
    </main>

</div>

</body>
</html>
