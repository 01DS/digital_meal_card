<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – Digital Meal Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #FFD6C0, #F8C8DC);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        background: #ffffff;
        width: 340px;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #444;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 15px;
        border: 1px solid #ddd;
        font-size: 14px;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 18px;
        background: #CFE8FF;
        font-size: 16px;
        cursor: pointer;
        font-weight: 500;
    }

    button:hover {
        background: #B6DBFF;
    }

    .error {
        margin-top: 10px;
        color: #D9534F;
        font-size: 14px;
        display: none;
    }
</style>
</head>

<body>

<div class="login-card">
    <h2>System Login</h2>

    <select id="role">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="staff">Cafeteria Staff</option>
    </select>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="error" id="error">Invalid login credentials</div>
</div>

</script>

</body>
</html>
