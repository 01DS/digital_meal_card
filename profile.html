<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<style>

    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #F5F6FA;
    }

    /* Top Navigation Bar */
    .navbar {
        width: 98%;
        background: linear-gradient(135deg, #FFB5D8, #B9A7FF, #6CA9FF);
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        color: white;
    }

    .navbar .logo {
        font-size: 20px;
        font-weight: bold;
    }

    .nav-links {
        display: flex;
        gap: 25px;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
    }

    .nav-links a:hover {
        text-decoration: underline;
    }

    /* Profile Container */
    .profile-container {
        width: 420px;
        background: white;
        margin: 40px auto;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .profile-container img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #B9A7FF;
        margin-bottom: 20px;
    }

    .profile-container h2 {
        margin: 10px 0;
        color: #444;
    }

    .info {
        text-align: left;
        margin-top: 20px;
    }

    .info p {
        background: #F5F6FA;
        padding: 12px;
        border-radius: 15px;
        margin: 10px 0;
        color: #555;
    }

    .edit-btn {
        margin-top: 25px;
        padding: 12px 20px;
        background-color: #6CA9FF;
        border: none;
        color: white;
        font-size: 15px;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .edit-btn:hover {
        background-color: #528ee0;
    }

</style>
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <div class="logo">Oda Bultum University</div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="#">Meal Card</a>
            <a href="#">Profile</a>
            <a href="#">History</a>
            <a href="#">Logout</a>
        </div>
    </div>

    <!-- Profile Section -->
    <div class="profile-container">
        <img src="OIP.webp" alt="Profile Photo">

        <h2>Ekram Mohammed</h2>

        <div class="info">
            <p><strong>ID:</strong> STU-2025-001</p>
            <p><strong>Department:</strong> Computer Science</p>
            <p><strong>Year:</strong> 4th Year</p>
            <p><strong>Status:</strong> Active</p>
        <script>
    const username = localStorage.getItem("username");

    if (!username) {
      window.location.href = "login.html";
    } else {
      document.getElementById("user").innerText = "Hello, " + username + " 👋";
    }

    
  </script>
</body>
</html>
