<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Digital Meal Card System</title>
<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #fefbff;
        display: flex;
    }

    /* Sidebar */
    .sidebar {
        width: 230px;
        background: linear-gradient(180deg, #ffb3c6, #ffd6a5);
        color: #fff;
        height: 100vh;
        padding-top: 20px;
        position: fixed;
        border-radius: 0 20px 20px 0;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 19px;
        font-weight: 600;
    }

    .sidebar a {
        display: block;
        padding: 14px 20px;
        text-decoration: none;
        color: white;
        font-size: 16px;
        margin: 8px 0;
        border-radius: 12px;
        transition: 0.2s;
    }

    .sidebar a:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    /* Main content */
    .main {
        margin-left: 230px;
        padding: 25px;
        width: calc(100% - 230px);
    }

    /* Header */
    .header {
        background: #ffffff;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 20px;
        box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.07);
        margin-bottom: 20px;
    }

    .header h2 {
        color: #5e548e;
        margin: 0;
    }

    /* Stat cards */
    .cards {
        display: flex;
        gap: 20px;
        margin-bottom: 25px;
    }

    .card {
        flex: 1;
        padding: 25px;
        border-radius: 20px;
        color: #333;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        font-weight: 500;
    }

    .pink {
        background: #ffc6ff;
    }
    .blue {
        background: #caffbf;
    }
    .purple {
        background: #bdb2ff;
    }

    .card h3 {
        margin: 0;
        font-size: 20px;
    }

    .card p {
        margin-top: 10px;
        font-size: 28px;
        font-weight: bold;
        color: #5e548e;
    }

    /* Action buttons */
    .actions button {
        background: #ffb5e8;
        color: #4a4a4a;
        border: none;
        padding: 12px 16px;
        margin-right: 10px;
        border-radius: 12px;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
    }

    .actions button:hover {
        background: #ff9cee;
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Meal Card</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="studentlist.html">Students</a>
    <a href="#">Meal Distribution</a>
    <a href="reports.html">Reports</a>
    <a href="#">Settings</a>
</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="header">
        <h2>Dashboard</h2>
        <div>Admin ▾</div>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card pink">
            <h3>Total Students</h3>
            <p>4500</p>
        </div>

        <div class="card blue">
            <h3>Cafe Users</h3>
            <p>2980</p>
        </div>

        <div class="card purple">
            <h3>Meals Today</h3>
            <p>1210</p>
        </div>
    </div>

    <!-- Actions -->
    <div class="actions">
       <a href="addstudent.html"><button>Add Student</button></a> 
        <button>Scan Card</button>
       <a href="reports.html" ><button>Generate Report</button></a>
    </div>

</div>

</body>
</html>
