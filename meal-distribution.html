<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meal Distribution</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #FFD6C0, #F8C8DC);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .topbar {
        width: 100%;
        padding: 18px;
        text-align: center;
        font-size: 22px;
        font-weight: 600;
        color: #fff;
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
    }

    .scanner-card {
        background: #ffffff;
        width: 90%;
        max-width: 700px;
        margin-top: 35px;
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .scan-box {
        border: 3px dashed #F3B6C8;
        border-radius: 20px;
        height: 200px;
        background: #FFF6FA;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 25px;
    }

    .scan-btn {
        margin-top: 10px;
        padding: 10px 22px;
        border: none;
        border-radius: 18px;
        background: #CFE8FF;
        cursor: pointer;
        font-size: 15px;
    }

    .student-info {
        background: #FFF8FB;
        border-radius: 18px;
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        font-size: 15px;
        color: #444;
        margin-bottom: 20px;
    }

    .student-info span {
        font-weight: 600;
        color: #666;
    }

    .status {
        grid-column: span 2;
        padding: 10px;
        text-align: center;
        border-radius: 15px;
        font-weight: 600;
    }

    .cafe {
        background: #C8F7DC;
        color: #2D6B2D;
    }

    .non-cafe {
        background: #FFB3B3;
        color: #6B2D2D;
    }

    .btn-group {
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .action-btn {
        padding: 12px 30px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 16px;
    }

    .approve { background: #C8F7DC; }
    .deny { background: #FFD7BA; }

    .popup {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 16px 24px;
    border-radius: 18px;
    font-size: 16px;
    font-weight: 600;
    color: #333;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    transition: 0.3s ease;
    z-index: 1000;
}

.popup.success {
    background: #C8F7DC;
    color: #2D6B2D;
}

.popup.error {
    background: #FFB3B3;
    color: #6B2D2D;
}

.hidden {
    display: none;
}

</style>
</head>

<body>

<div class="topbar">Meal Distribution</div>

<div class="scanner-card">

    <div class="scan-box">
        <div id="scanText">Waiting for scan…</div>
        <button class="scan-btn" onclick="scanQR()">Start Scan</button>
    </div>

    <div class="student-info">
        <div><span>Name:</span> <span id="name">---</span></div>
        <div><span>ID:</span> <span id="id">---</span></div>
        <div><span>Department:</span> <span id="dept">---</span></div>
        <div><span>Year:</span> <span id="year">---</span></div>
        <div id="status" class="status">No data</div>
    </div>

   <div class="btn-group">
    <button class="action-btn approve" onclick="approveMeal()">Approve Meal</button>
    <button class="action-btn deny" onclick="denyMeal()">Deny</button>
</div>


</div>

<script>

    const students = [
        {
            name: "Selam Kebede",
            id: "UGR/1234/12",
            dept: "Computer Science",
            year: "3rd Year",
            cafe: true
        },
        {
            name: "Yonas Abebe",
            id: "UGR/5678/12",
            dept: "Civil Engineering",
            year: "2nd Year",
            cafe: false
        }
    ];

    function scanQR() {
        const scannedID = "UGR/1234/12"; // from QR code

        document.getElementById("scanText").innerText = "QR Code Detected";

        const student = students.find(s => s.id === scannedID);
        const status = document.getElementById("status");

        if (!student) {
            status.innerText = "Invalid QR Code";
            status.className = "status non-cafe";
            return;
        }

        document.getElementById("name").innerText = student.name;
        document.getElementById("id").innerText = student.id;
        document.getElementById("dept").innerText = student.dept;
        document.getElementById("year").innerText = student.year;

        if (student.cafe) {
            status.innerText = "Café User – Eligible for Meal";
            status.className = "status cafe";
        } else {
            status.innerText = "Non-Café Student – Access Denied";
            status.className = "status non-cafe";
        }
    }
</script>
<script>
    function showPopup(message, type) {
        const popup = document.getElementById("popup");
        popup.innerText = message;
        popup.className = "popup " + type;

        popup.classList.remove("hidden");

        setTimeout(() => {
            popup.classList.add("hidden");
        }, 2000);
    }

    function approveMeal() {
        showPopup("Meal Approved ✔", "success");
    }

    function denyMeal() {
        showPopup("Meal Access Denied ✖", "error");
    }
</script>

<!-- Popup Message -->
<div id="popup" class="popup hidden"></div>

</body>
</html>
