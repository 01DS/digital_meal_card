<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Student List</title>
<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #fefbff;
        display: flex;
    }

    /* Sidebar */
    .sidebar {
        width: 230px;
        background: linear-gradient(180deg, #ffb3c6, #ffd6a5);
        color: #fff;
        height: 100vh;
        padding-top: 20px;
        position: fixed;
        border-radius: 0 20px 20px 0;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 19px;
        font-weight: 600;
    }

    .sidebar a {
        display: block;
        padding: 14px 20px;
        text-decoration: none;
        color: white;
        font-size: 16px;
        margin: 8px 0;
        border-radius: 12px;
        transition: 0.2s;
    }

    .sidebar a:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    /* Main */
    .main {
        margin-left: 230px;
        padding: 25px;
        width: calc(100% - 230px);
    }

    /* Header */
    .header {
        background: #ffffff;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 20px;
        box-shadow: 0px 3px 8px rgba(0,0,0,0.07);
        margin-bottom: 20px;
    }

    .header h2 {
        color: #5e548e;
        margin: 0;
    }

    .add-btn {
        background: #ffb5e8;
        border: none;
        padding: 10px 18px;
        border-radius: 12px;
        font-size: 15px;
        cursor: pointer;
        color: #4a4a4a;
        transition: 0.2s;
    }
    .add-btn:hover {
        background: #ff9cee;
    }

    /* Table container */
    .table-container {
        background: #ffffff;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0px 3px 10px rgba(0,0,0,0.08);
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 12px;
        overflow: hidden;
    }

    thead {
        background: #ffd6e0;
    }

    thead th {
        padding: 12px;
        font-size: 15px;
        color: #5e548e;
        text-align: left;
    }

    tbody tr {
        background: #fff7ff;
        transition: 0.2s;
    }

    tbody tr:hover {
        background: #ffe3ff;
    }

    tbody td {
        padding: 12px;
        font-size: 14px;
        color: #4a4a4a;
        border-bottom: 1px solid #f2d8ff;
    }

    .status {
        padding: 5px 12px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
    }
    .cafe {
        background: #caffbf;
        color: #3d6b3d;
    }
    .noncafe {
        background: #ffadad;
        color: #6b2f2f;
    }

    .action-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 10px;
        font-size: 13px;
        cursor: pointer;
        margin-right: 5px;
    }
    .edit {
        background: #bde0fe;
        color: #1e4f7b;
    }
    .delete {
        background: #ffb3b3;
        color: #7b1d1d;
    }

</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Meal Card</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="studentlist.html">Students</a>
    <a href="meal-distribution.html">Meal Distribution</a>
    <a href="reports.html">Reports</a>
    <a href="#">Settings</a>
</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="header">
        <h2>Student List</h2>
       <a href="addstudent.html"> <button class="add-btn">+ Add Student</button></a>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Full Name</th>
                    <th>ID</th>
                    <th>Department</th>
                    <th>Year</th>
                    <th>Cafe Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

           <tbody id="studentTable">

                <tr>
                    <td><img src="https://via.placeholder.com/40" style="border-radius:50%"></td>
                    <td>Selam Kebede</td>
                    <td>UGR/1234/12</td>
                    <td>Computer Science</td>
                    <td>3rd Year</td>
                    <td><span class="status cafe">Cafe User</span></td>
                    <td>
                        <button class="action-btn edit">Edit</button>
                        <button class="action-btn delete">Delete</button>
                    </td>
                </tr>

                <tr>
                    <td><img src="https://via.placeholder.com/40" style="border-radius:50%"></td>
                    <td>Yonas Abebe</td>
                    <td>UGR/5678/12</td>
                    <td>Civil Engineering</td>
                    <td>2nd Year</td>
                    <td><span class="status noncafe">Non-Cafe</span></td>
                    <td>
                        <button class="action-btn edit">Edit</button>
                        <button class="action-btn delete">Delete</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</div>
<script>
window.onload = function () {
    const table = document.getElementById("studentTable");

    const students = JSON.parse(localStorage.getItem("students")) || [];

    table.innerHTML = "";

    students.forEach(student => {
        const row = `
            <tr>
                <td>${student.name}</td>
                <td>${student.id}</td>
                <td>${student.department}</td>
                <td>${student.year}</td>
                <td>
                    ${student.cafe 
                        ? '<span class="status cafe">Café User</span>' 
                        : '<span class="status noncafe">Non-Café</span>'}
                </td>
            </tr>
        `;
        table.innerHTML += row;
    });
};
</script>

</body>
</html>
