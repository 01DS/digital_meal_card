<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Meal Scan</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #0f172a);
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      color: #e5e7eb;
    }

    .site-header,
    .site-footer {
      padding: 16px 24px;
      background: rgba(2, 6, 23, 0.9);
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .site-footer {
      border-top: 1px solid #1e293b;
      border-bottom: none;
      justify-content: center;
      color: #94a3b8;
    }

    .brand {
      font-weight: 700;
      color: #38bdf8;
    }

    .page-title {
      color: #cbd5f5;
    }

    .page-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px 40px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      background: #020617;
      padding: 30px;
      border-radius: 18px;
      width: 720px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .panel {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 20px;
    }

    h2 {
      margin-top: 0;
      color: #38bdf8;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5f5;
    }

    select, input, button {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    select, input {
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #1e293b;
    }

    button {
      margin-top: 18px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #22c55e;
    }

    button.rescan {
      background: #f59e0b;
      color: #111827;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .student-info {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      background: #0b1220;
      font-size: 13px;
      line-height: 1.5;
      min-height: 70px;
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    .hint {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-top: 10px;
    }

    .logout-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1200;
    }

    .logout-btn {
      width: auto;
      margin: 0;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #ef4444;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="brand">Meal Card System</div>
  <div class="page-title">Meal Scan</div>
</header>

<div class="logout-wrap">
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<main class="page-content">
<div class="container">

  <!-- LEFT: CAMERA -->
  <div class="panel">
    <h2>Camera Scan</h2>
    <div id="reader"></div>
    <button class="secondary" onclick="startCamera()">Start Camera</button>
    <button class="rescan" onclick="rescan()">Rescan Next Student</button>
    <div class="hint">Point camera at student QR code</div>
  </div>

  <!-- RIGHT: MEAL ACTION -->
  <div class="panel">
    <h2>Meal Validation</h2>

    <label>Meal Type</label>
    <select id="mealType">
      <option value="breakfast">Breakfast</option>
      <option value="lunch">Lunch</option>
      <option value="dinner">Dinner</option>
    </select>

    <label>Staff ID</label>
    <input id="staffId" type="number" placeholder="Enter your staff ID" />

    <button onclick="submitScan()">Confirm Meal</button>

    <div class="status" id="status"></div>
    <div class="student-info" id="studentInfo">No student scanned yet.</div>
  </div>

</div>
</main>

<footer class="site-footer">
  &copy; Oda Bultum University Cafeteria System
</footer>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="auth.js"></script>
<script>
  requireAuth();

  let scannedQr = null;
  let html5QrCode = null;
  let isCameraRunning = false;

  async function startCamera() {
    const status = document.getElementById("status");

    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("reader");
    }

    if (isCameraRunning) {
      status.textContent = "Camera is already running";
      status.style.color = "#f59e0b";
      return;
    }

    try {
      await html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        async (decodedText) => {
          scannedQr = decodedText;
          if (isCameraRunning) {
            await html5QrCode.stop();
            isCameraRunning = false;
          }
          document.getElementById("status").textContent = "QR detected. Ready to confirm meal.";
          document.getElementById("status").style.color = "#22c55e";
          previewScan(decodedText);
        }
      );

      isCameraRunning = true;
      status.textContent = "Camera started. Scan a student QR code.";
      status.style.color = "#38bdf8";
    } catch {
      isCameraRunning = false;
      status.textContent = "Unable to start camera";
      status.style.color = "#f87171";
    }
  }

  async function rescan() {
    const status = document.getElementById("status");
    const studentInfo = document.getElementById("studentInfo");

    scannedQr = null;
    studentInfo.textContent = "No student scanned yet.";

    if (html5QrCode && isCameraRunning) {
      try {
        await html5QrCode.stop();
      } catch {
      }
      isCameraRunning = false;
    }

    status.textContent = "Ready for next student. Starting camera...";
    status.style.color = "#38bdf8";
    await startCamera();
  }

  async function previewScan(qrData) {
    const studentInfo = document.getElementById("studentInfo");

    try {
      const res = await fetch("http://localhost:5000/api/scan/preview", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ qrData })
      });

      const data = await res.json();
      if (!res.ok) {
        studentInfo.textContent = data.message || "Unable to load student info.";
        return;
      }

      studentInfo.innerHTML = `
        <strong>${data.student.full_name}</strong><br>
        Student ID: ${data.student.student_id}<br>
        Department: ${data.student.department}<br>
        Program: ${data.student.program}<br>
        Status: ${data.student.cafeteria_status || "cafeteria"}<br>
        Year: ${data.student.year}
      `;
    } catch {
      studentInfo.textContent = "Unable to load student info.";
    }
  }

  async function submitScan() {
    const staffId = document.getElementById("staffId").value;
    const mealType = document.getElementById("mealType").value;
    const status = document.getElementById("status");
    const studentInfo = document.getElementById("studentInfo");

    if (!scannedQr) {
      status.textContent = "Please scan a QR code first";
      status.style.color = "#f87171";
      return;
    }

    status.textContent = "Processing...";

    try {
      const res = await fetch("http://localhost:5000/api/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ qrData: scannedQr, staffId, mealType })
      });

      const data = await res.json();
      status.textContent = data.message;
      status.style.color = res.ok ? "#22c55e" : "#f87171";

      if (res.ok && data.student) {
        studentInfo.innerHTML = `
          <strong>${data.student.full_name}</strong><br>
          Student ID: ${data.student.student_id}<br>
          Department: ${data.student.department}<br>
          Program: ${data.student.program}<br>
          Status: ${data.student.cafeteria_status || "cafeteria"}<br>
          Year: ${data.student.year}<br>
          Last meal: ${data.meal.meal_type} (${data.meal.date})
        `;
      }
    } catch {
      status.textContent = "Server error";
      status.style.color = "#f87171";
    }
  }
</script>

</body>
</html>
