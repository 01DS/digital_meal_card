<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Add Student</title>
<style>
    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #fefbff;
        display: flex;
    }

    /* Sidebar (same pastel style) */
    .sidebar {
        width: 230px;
        background: linear-gradient(180deg, #ffb3c6, #ffd6a5);
        color: #fff;
        height: 100vh;
        padding-top: 20px;
        position: fixed;
        border-radius: 0 20px 20px 0;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 19px;
        font-weight: 600;
    }

    .sidebar a {
        display: block;
        padding: 14px 20px;
        text-decoration: none;
        color: white;
        font-size: 16px;
        margin: 8px 0;
        border-radius: 12px;
        transition: 0.2s;
    }

    .sidebar a:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    /* Main content */
    .main {
        margin-left: 230px;
        padding: 25px;
        width: calc(100% - 230px);
    }

    /* Header */
    .header {
        background: #ffffff;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 20px;
        box-shadow: 0px 3px 8px rgba(0,0,0,0.07);
        margin-bottom: 20px;
    }

    .header h2 {
        color: #5e548e;
        margin: 0;
    }

    /* Form Container */
    .form-container {
        background: #ffffff;
        padding: 30px;
        border-radius: 20px;
        width: 60%;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
        margin: auto;
    }

    .form-container h3 {
        text-align: center;
        margin-bottom: 25px;
        color: #5e548e;
        font-size: 22px;
    }

    /* Form Fields */
    .input-group {
        margin-bottom: 18px;
    }

    .input-group label {
        display: block;
        font-size: 15px;
        margin-bottom: 6px;
        color: #6c5a89;
    }

    .input-group input,
    .input-group select {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid #e8e8e8;
        font-size: 15px;
        background: #fdfaff;
    }

    .input-group input:focus,
    .input-group select:focus {
        outline: none;
        border-color: #ffb3c6;
        box-shadow: 0 0 4px rgba(255, 150, 150, 0.4);
    }

    /* Submit button */
    .submit.btn {
        width: 100%;
        padding: 14px;
        background: #ffb5e8;
        border: none;
        border-radius: 14px;
        color: #4a4a4a;
        font-size: 17px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.2s;
    }

    .submit.btn:hover {
        background: #ff9cee;
    }

</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Meal Card</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="studentlist.html">Students</a>
    <a href="#">Meal Distribution</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
</div>

<!-- Main -->
<div class="main">

    <!-- Header -->
    <div class="header">
        <h2>Add Student</h2>
        <div>Admin ▾</div>
    </div>

    <!-- Form -->
    <div class="form-container">
        <h3>Register New Student</h3>

        <form>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter full name">
            </div>

            <div class="input-group">
                <label>ID Number</label>
                <input type="text" placeholder="University ID">
            </div>

            <div class="input-group">
                <label>Department</label>
                <input type="text" placeholder="Department name">
            </div>

            <div class="input-group">
                <label>Year of Study</label>
                <select>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                    <option>5th Year</option>
                </select>
            </div>

            <div class="input-group">
                <label>Cafe Status</label>
                <select>
                    <option>Cafe User</option>
                    <option>Non-Cafe</option>
                </select>
            </div>

            <div class="input-group">
                <label>Upload Photo</label>
                <input type="file">
            </div>

            <button class="submit-btn">Add Student</button>


        </form>
    </div>

</div>
<script>
function addStudent() {
    const student = {
        name: document.getElementById("name").value,
        id: document.getElementById("studentId").value,
        department: document.getElementById("department").value,
        year: document.getElementById("year").value,
        cafe: document.getElementById("cafeStatus").value === "true"
    };

    // Get existing students or empty array
    let students = JSON.parse(localStorage.getItem("students")) || [];

    // Add new student
    students.push(student);

    // Save back to localStorage
    localStorage.setItem("students", JSON.stringify(students));

    alert("Student added successfully!");

    // Optional: redirect to list
    window.location.href = "student-list.html";
}
</script>

</body>
</html>
