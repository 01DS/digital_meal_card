<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #F5F6FA;
    }

    /* Top Navigation Bar */
    .navbar {
        width: 98%;
        background: linear-gradient(135deg, #FFB5D8, #B9A7FF, #6CA9FF);
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        color: white;
    }

    .navbar .logo {
        font-size: 20px;
        font-weight: bold;
    }

    .nav-links {
        display: flex;
        gap: 25px;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
    }

    .nav-links a:hover {
        text-decoration: underline;
    }

    /* Dashboard Content */
    .container {
        padding: 40px;
        text-align: center;
    }

    h2 {
        color: #333;
        margin-bottom: 30px;
    }

    /* Cards */
    .card-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .dash-card {
        background: white;
        width: 260px;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .dash-card:hover {
        transform: scale(1.05);
    }

    .dash-card h3 {
        margin-bottom: 15px;
        color: #444;
    }

    .dash-card button {
        padding: 10px 20px;
        border: none;
        border-radius: 15px;
        background-color: #6CA9FF;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .dash-card button:hover {
        background-color: #528ee0;
    }
</style>

</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <div class="logo">Oda Bultum University</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="#">Meal Card</a>
            <a href="profile.html">Profile</a>
            <a href="mealhistory.html">History</a>
            <a href="#">Logout</a>
        </div>
    </div>

    <!-- Dashboard Body -->
    <div class="container">
        <h2>Welcome</h2>

        <div class="card-row">

            <div class="dash-card">
                <h3>My Meal Card</h3>
                <a href="mealcard.html"><button>Open</button></a>
            </div>

            <div class="dash-card">
                <h3>Meal History</h3>
               <a href="mealhistory.html" ><button>View</button></a>
            </div>

            <div class="dash-card">
                <h3>Profile</h3>
                <a href="profile.html"><button>View Profile</button></a>
            </div>

        </div>
    </div>

</body>
</html>
